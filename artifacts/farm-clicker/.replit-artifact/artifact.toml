kind = "web"
previewPath = "/"
title = "Farm Clicker"
version = "1.0.0"
id = "artifacts/farm-clicker"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24525

[services.development]
run = "pnpm --filter @workspace/farm-clicker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/farm-clicker", "run", "build" ]
serve = "static"
publicDir = "artifacts/farm-clicker/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24525"
BASE_PATH = "/"
