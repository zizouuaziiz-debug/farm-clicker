kind = "web"
previewPath = "/farm-admin/"
title = "Farm Admin"
version = "1.0.0"
id = "artifacts/farm-admin"
router = "path"

[[services]]
name = "web"
paths = [ "/farm-admin/" ]
localPort = 24933

[services.development]
run = "pnpm --filter @workspace/farm-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/farm-admin", "run", "build" ]
serve = "static"
publicDir = "artifacts/farm-admin/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24933"
BASE_PATH = "/farm-admin/"
